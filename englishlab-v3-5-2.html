const normalize = (s) => (s||"").toString().toLowerCase().replace(/[.,!?;:"'„""«»\(\)\[\]]/g,'').replace(/\s+/g,' ').trim();
const answersMatch = (user, answer, accept) => { const u=normalize(user); if(!u)return false; if(u===normalize(answer))return true; if(accept&&accept.some(a=>normalize(a)===u))return true; return false; };
const today = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const yesterday = () => { const d=new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const shuffle = (arr) => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const wordOverlap = (said, target) => { const s=normalize(said).split(' ').filter(Boolean); const t=normalize(target).split(' ').filter(Boolean); if(!t.length)return 0; const matched=t.filter(w=>s.includes(w)).length; return matched/t.length; };
// Generator pseudo-random deterministic (seed-uit cu data) pentru Testul Zilei
const dateSeed = (str) => { let h=2166136261; for(let i=0;i<str.length;i++){h^=str.charCodeAt(i); h=Math.imul(h,16777619);} return (h>>>0)||1; };
const seededRand = (seed) => { let s=seed>>>0; return ()=>{ s=(s+0x6D2B79F5)>>>0; let t=s; t=Math.imul(t^(t>>>15),t|1); t^=t+Math.imul(t^(t>>>7),t|61); return ((t^(t>>>14))>>>0)/4294967296; }; };
const seededShuffle = (arr, rand) => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const buildDailyTest = (dateStr) => {
  const rand = seededRand(dateSeed("daily-"+dateStr));
  const pool = [];
  LESSONS.forEach(l => l.steps.forEach(s => { if(s.type!=="intro") pool.push({...s, _src:l.title, _emoji:l.emoji}); }));
  const picked = seededShuffle(pool, rand).slice(0, 7);
  // Re-shuffle cuvintele pentru pașii de tip "order" cu același seed (stabil pe zi)
  return picked.map(s => s.type==="order" ? {...s, words: seededShuffle(s.words, rand)} : s);
};

const playSound = (type) => {
  const ctx = getAudioCtx(); if(!ctx) return;

function EnglishLab(){
  const [screen, setScreen] = useState(()=>localStorage.getItem("elab-key")?"home":"welcome");

  const [lessonComplete, setLessonComplete] = useState(false);
  const [confetti, setConfetti] = useState(false);
  const [listeningStep, setListeningStep] = useState(false);
  const [stepLive, setStepLive] = useState("");
  // Practică opțională la ecranele de intro
  const [introPractice, setIntroPractice] = useState({listening:false, live:"", heard:"", score:null});
  const [shuffledWords, setShuffledWords] = useState([]);
  const [orderSelected, setOrderSelected] = useState([]);
  const [chatMessages, setChatMessages] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [chatListening, setChatListening] = useState(false);
  const [chatLive, setChatLive] = useState("");
  const [tranMode, setTranMode] = useState("text");
  const [tranInput, setTranInput] = useState("");
  const [tranSrc, setTranSrc] = useState("auto");
  const [tranDst, setTranDst] = useState("ro");
  const [tranResult, setTranResult] = useState(null);
  const [tranDetected, setTranDetected] = useState("");
  const [tranLoading, setTranLoading] = useState(false);
  const [tranListening, setTranListening] = useState(false);
  const [tranLive, setTranLive] = useState("");
  const [phraseCat, setPhraseCat] = useState("all");
  const [testingKey, setTestingKey] = useState(false);
  const speechRef = useRef(null);
  const photoRef = useRef(null);
  const galleryRef = useRef(null);
  const messagesEndRef = useRef(null);

  const currentStep = lesson && lesson.steps[stepIdx];

  useEffect(()=>{
    const t=today(),y=yesterday();
    if(lastActiveDay && lastActiveDay !== t && lastActiveDay !== y){
      setStreak(0); localStorage.setItem("elab-streak","0");
    }
  },[]);

  useEffect(()=>{
    const loadVoices = ()=>{const v=window.speechSynthesis.getVoices(); if(v.length)setVoices(v);};
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;

  useEffect(()=>{

  const saveProgress = (newXp, newCompleted, newStreak) => {

    localStorage.setItem("elab-completed", JSON.stringify(newCompleted));
    localStorage.setItem("elab-streak", String(newStreak));
    localStorage.setItem("elab-lastday", today());
  };

  const pickEnVoice = () => {
    if(!voices.length) return null;
    if(voiceAndreea){const v=voices.find(x=>x.name===voiceAndreea); if(v)return v;}
    const premium=["Samantha","Ava","Allison","Karen","Zira","Jenny","Aria","Libby"];
    for(const name of premium){const v=voices.find(x=>x.name.includes(name)&&x.lang.startsWith("en")); if(v)return v;}
    return voices.find(x=>x.lang.startsWith("en-US"))||voices.find(x=>x.lang.startsWith("en"))||null;
  };

  const pickRoVoice = () => {
    if(!voices.length) return null;
    if(voiceRo){const v=voices.find(x=>x.name===voiceRo); if(v)return v;}
    const native=["Microsoft Andrei","Google română","Google Romanian","Carmen","Ioana"];
    for(const name of native){const v=voices.find(x=>x.name.includes(name)); if(v)return v;}
    return voices.find(x=>x.lang.startsWith("ro"))||null;
  };

  const pickVoiceForLang = (code) => {
    if(!voices.length) return null;
    if(code==="en") return pickEnVoice();
    if(code==="ro") return pickRoVoice();
    const lang = LANGS.find(l=>l.code===code);
    if(!lang||!lang.stt) return null;
    const prefix = lang.stt.split("-")[0];
    return voices.find(x=>x.lang===lang.stt) || voices.find(x=>x.lang.startsWith(prefix+"-")) || null;
  };

  const speak = (text, lang="en", rate=0.92, onEnd) => {
    try{
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      const v = pickVoiceForLang(lang);
      if(v){u.voice=v; u.lang=v.lang;}
      else u.lang = lang==="en"?"en-US":(LANGS.find(l=>l.code===lang)?.stt||"en-US");
      u.rate = rate; u.pitch = 1.0;
      if(onEnd) u.onend = onEnd;
      window.speechSynthesis.speak(u);
    }catch(e){if(onEnd)onEnd();}
  };

  const stopSpeaking = () => {try{window.speechSynthesis.cancel();}catch(e){}};

  const speakSequence = (segments) => {
    stopSpeaking();
    let i = 0;
    const next = () => {
      if(i >= segments.length) return;
      const {text, lang} = segments[i]; i++;
      speak(text, lang, lang==="ro"?0.95:0.92, ()=>setTimeout(next, 420));
    };
    next();
  };

  const startListening = (lang, onResult, onLive, onError) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){if(onError)onError("Recunoașterea vocală nu e suportată"); return null;}
    stopSpeaking();
    const r = new SR();
    r.lang = lang; r.continuous = false; r.interimResults = true; r.maxAlternatives = 10;
    let finalText = "", bestText = "";
    r.onresult = (e) => {
      let interim = "";
      for(let i=e.resultIndex;i<e.results.length;i++){
        const res = e.results[i];
        if(res.isFinal){
          let best=res[0].transcript, bestConf=res[0].confidence||0;
          for(let k=1;k<res.length;k++){const c=res[k].confidence||0; if(c>bestConf){bestConf=c; best=res[k].transcript;}}
          finalText += best + " "; bestText = best;
        } else { interim += res[0].transcript; }
      }
      if(onLive) onLive(interim || bestText || finalText);
    };
    r.onend = () => {if(onResult)onResult((finalText||bestText).trim());};
    r.onerror = (e) => {if(onError)onError(e.error||"Eroare microfon");};
    r.start();
    return r;
  };

  const friendlyError = (status, body) => {
    if(status===401) return "Cheia API e invalidă sau expirată. Verifică în Setări și testeaz-o.";
    if(status===429) return "Prea multe cereri. Așteaptă un minut și încearcă din nou.";
    if(status===529) return "Serverul Anthropic e supraîncărcat. Încearcă din nou în câteva secunde.";
    if(status===400) return "Cerere invalidă către API. Încearcă să resetezi conversația.";
    if(status>=500) return "Server Anthropic indisponibil ("+status+"). Încearcă mai târziu.";
    return "Eroare "+status+". Verifică cheia API.";
  };

  const callClaude = async (sys, user, opts={}) => {
    if(!apiKey) throw new Error("Lipsește cheia API");
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 20000);
    try{
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:opts.maxTokens||600,system:sys,messages:[{role:"user",content:user}]}),
        signal:controller.signal
      });
      clearTimeout(timeoutId);
      if(!res.ok){const t=await res.text(); throw new Error(friendlyError(res.status, t));}
      const data = await res.json();
      return data.content[0].text;
    }catch(e){
      clearTimeout(timeoutId);
      if(e.name==='AbortError') throw new Error("Conexiunea a durat prea mult. Încearcă din nou.");
      throw e;
    }
  };

  const callClaudeMulti = async (sys, messages, opts={}) => {
    if(!apiKey) throw new Error("Lipsește cheia API");
    // Păstrează doar ultimele 10 mesaje pentru a reduce costul și timpul
    const limitedMessages = messages.length > 10 ? messages.slice(-10) : messages;
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 20000);
    try{
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:opts.maxTokens||600,system:sys,messages:limitedMessages}),
        signal:controller.signal
      });
      clearTimeout(timeoutId);
      if(!res.ok){const t=await res.text(); throw new Error(friendlyError(res.status, t));}
      const data = await res.json();
      return data.content[0].text;
    }catch(e){
      clearTimeout(timeoutId);
      if(e.name==='AbortError') throw new Error("Conexiunea a durat prea mult. Încearcă din nou.");
      throw e;
    }
  };

  const callClaudeVision = async (base64, mediaType, sys, user) => {
    if(!apiKey) throw new Error("Lipsește cheia API");
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 30000);
    try{
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,system:sys,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mediaType,data:base64}},{type:"text",text:user}]}]}),
        signal:controller.signal
      });
      clearTimeout(timeoutId);
      if(!res.ok){const t=await res.text(); throw new Error(friendlyError(res.status, t));}
      const data = await res.json();
      return data.content[0].text;
    }catch(e){
      clearTimeout(timeoutId);
      if(e.name==='AbortError') throw new Error("Conexiunea a durat prea mult. Încearcă din nou.");
      throw e;
    }
  };

  const go = (s) => {
    stopSpeaking();
    if(s==="lesson-exit"){
      setLesson(null); setStepIdx(0); setUserAnswer(null); setCheckState("idle");
      setLessonMistakes(0); setLessonComplete(false); setScreen("home"); return;
    }
    setScreen(s);
  };

  const exportProgress = () => {
    try{
      const data = {
        xp: xp,
        completed: completed,
        streak: streak,
        lastActiveDay: lastActiveDay,
        exportedAt: new Date().toISOString(),
        version: "1"
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const d = new Date();
      const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      a.download = `andreea-progres-${dateStr}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){
      alert("Eroare la export: "+e.message);
    }
  };

  const importProgress = (event) => {
    const file = event.target.files && event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const data = JSON.parse(e.target.result);
        if(typeof data.xp !== "number" || !data.completed){
          alert("Fișier invalid — nu conține date de progres.");
          return;
        }
        if(!confirm(`Importă progresul?\n\nXP: ${data.xp}\nLecții complete: ${Object.keys(data.completed||{}).length}\nStreak: ${data.streak||0}\n\n(Progresul actual va fi înlocuit.)`)) return;
        localStorage.setItem("elab-xp", String(data.xp));
        localStorage.setItem("elab-completed", JSON.stringify(data.completed));
        localStorage.setItem("elab-streak", String(data.streak||0));
        if(data.lastActiveDay) localStorage.setItem("elab-lastday", data.lastActiveDay);

        alert("Eroare la citirea fișierului: "+err.message);

    reader.readAsText(file);
    event.target.value = ""; // reset input ca să poți reîncărca același fișier
  };

  const saveApiKey = () => {
    // curăț orice whitespace vizibil/invizibil, zero-width chars, line breaks
    const k = apiInput.replace(/[\s\u200B-\u200D\uFEFF\r\n\t]/g,'').trim();
    if(!k.startsWith("sk-ant-")){alert("Cheia trebuie să înceapă cu «sk-ant-»"); return;}

    localStorage.setItem("elab-key", k);
    setApiKey(k); setApiInput(""); setScreen("home");
  };

  const testApiKey = async () => {

    try{

        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:10,messages:[{role:"user",content:"Say hi"}]})
      });
      if(res.ok) alert("✅ Cheia funcționează perfect!");
      else if(res.status===401) alert("❌ Cheia e invalidă sau expirată.\n\nȘterge-o și introdu alta nouă.");
      else if(res.status===429) alert("⚠️ Cheia e validă, dar ai atins limita de cereri. Încearcă peste câteva minute.");
      else alert("❌ Eroare "+res.status+". Cheia pare problematică.");
    }catch(e){
      alert("❌ Nu pot conecta la Anthropic: "+e.message);
    }finally{ setTestingKey(false); }
  };

  const startLesson = (l) => {
    setLesson(l); setStepIdx(0); setUserAnswer(null); setCheckState("idle");
    setLessonMistakes(0); setStepMistake(false); setLessonComplete(false);
    setShuffledWords(l.steps[0]?.type==="order" ? shuffle(l.steps[0].words) : []);
    setOrderSelected([]); setScreen("lesson");
    setTimeout(()=>{if(l.steps[0]?.type==="intro")speak(l.steps[0].en,"en",0.9);}, 300);
  };

  const isLessonUnlocked = (lessonId) => lessonId===1 || !!completed[lessonId-1];

  const checkStep = () => {
    if(!currentStep) return;
    let correct = false;
    if(currentStep.type==="intro") correct = true;
    else if(currentStep.type==="choice") correct = userAnswer === currentStep.correct;
    else if(currentStep.type==="order") correct = normalize(orderSelected.join(" ")) === normalize(currentStep.answer);
    else if(currentStep.type==="fill") correct = answersMatch(userAnswer||"", currentStep.answer, currentStep.alternatives);
    else if(currentStep.type==="type") correct = answersMatch(userAnswer||"", currentStep.answer, currentStep.accept);
    else if(currentStep.type==="speak") correct = wordOverlap(userAnswer||"", currentStep.en) >= 0.6;
    if(correct){
      setCheckState("correct"); playSound("correct");
      if(currentStep.en) setTimeout(()=>speak(currentStep.en,"en",0.95), 200);
    } else {
      setCheckState("wrong"); playSound("wrong");
      if(!stepMistake){setStepMistake(true); setLessonMistakes(m=>m+1);}
    }
  };

  const retryStep = () => {
    setUserAnswer(null); setCheckState("idle");
    if(currentStep.type==="order"){
      setShuffledWords(shuffle(currentStep.words));
      setOrderSelected([]);
    }
  };

  const nextStep = () => {
    stopSpeaking();
    if(!lesson) return;
    if(stepIdx >= lesson.steps.length-1){finalizeLesson(); return;}
    const next = stepIdx + 1;
    setStepIdx(next); setUserAnswer(null); setCheckState("idle"); setStepMistake(false);
    const nextStepObj = lesson.steps[next];
    if(nextStepObj.type==="order"){
      setShuffledWords(shuffle(nextStepObj.words));
      setOrderSelected([]);
    }
    setTimeout(()=>{if(nextStepObj.type==="intro")speak(nextStepObj.en,"en",0.9);}, 250);
  };

  const finalizeLesson = () => {
    const perfect = lessonMistakes === 0;
    const earnedXp = Math.max(5, 15 + (perfect?10:0) - lessonMistakes*2);
    const t = today(), y = yesterday();
    let newStreak = streak;
    if(lastActiveDay !== t){
      if(lastActiveDay === y || streak === 0) newStreak = streak + 1;
      else newStreak = 1;
      setStreak(newStreak); setLastActiveDay(t);
    }
    const result = {date:t, mistakes:lessonMistakes, xp:earnedXp, perfect};
    setLastResult(result);
    if(lesson.id === "daily-test"){
      // Testul zilei — nu intră în "completed" (lecțiile rămân marcate complete normal)
      const newXp = xp + earnedXp;
      setXp(newXp);
      localStorage.setItem("elab-xp", String(newXp));
      localStorage.setItem("elab-streak", String(newStreak));
      localStorage.setItem("elab-lastday", t);
      localStorage.setItem("elab-daily-test-done", t);
      setDailyTestDone(t);
    } else {
      const newCompleted = {...completed, [lesson.id]:result};
      const newXp = xp + earnedXp;
      setCompleted(newCompleted); setXp(newXp);
      saveProgress(newXp, newCompleted, newStreak);
    }
    setLessonComplete(true); setConfetti(true);
    playSound("complete");
    setTimeout(()=>setConfetti(false), 3000);
  };

  const orderPick = (word, idx) => {
    playSound("tap");
    setOrderSelected([...orderSelected, word]);
    setShuffledWords(shuffledWords.filter((_,i)=>i!==idx));
  };

  const orderUnpick = (idx) => {
    playSound("tap");
    const word = orderSelected[idx];
    setOrderSelected(orderSelected.filter((_,i)=>i!==idx));
    setShuffledWords([...shuffledWords, word]);
  };

  const startSpeakStep = () => {
    if(!currentStep || currentStep.type!=="speak") return;
    setStepLive(""); setListeningStep(true);
    speechRef.current = startListening("en-US",
      (text)=>{setListeningStep(false); setStepLive(""); setUserAnswer(text);},
      (live)=>setStepLive(live),
      (err)=>{setListeningStep(false); setStepLive(""); alert("Eroare microfon: "+err);}
    );
  };

  const stopSpeakStep = () => {
    if(speechRef.current){try{speechRef.current.stop();}catch(e){} speechRef.current=null;}
    setListeningStep(false);
  };

  const startIntroPractice = () => {
    if(!currentStep || currentStep.type!=="intro") return;
    // textul pentru practică — poate fi multi-linie (ex: "one, two, three")
    const target = currentStep.en;
    setIntroPractice({listening:true, live:"", heard:"", score:null});
    speechRef.current = startListening("en-US",
      (text)=>{
        const overlap = wordOverlap(text, target);
        let score = "wrong";
        if(overlap >= 0.75) score = "perfect";
        else if(overlap >= 0.45) score = "close";
        setIntroPractice({listening:false, live:"", heard:text, score});
        if(score==="perfect") playSound("correct");
        else if(score==="close") playSound("tap");
        else playSound("wrong");
      },
      (live)=>setIntroPractice(p=>({...p, live})),
      (err)=>{
        setIntroPractice({listening:false, live:"", heard:"", score:null});
        alert("Eroare microfon: "+err);
      }
    );
  };

  const stopIntroPractice = () => {
    if(speechRef.current){try{speechRef.current.stop();}catch(e){} speechRef.current=null;}
    setIntroPractice(p=>({...p, listening:false}));
  };

  const openChat = () => {
    stopSpeaking();
    if(!apiKey){
      setScreen("settings");
      alert("Adaugă mai întâi cheia API din Setări ca să vorbești cu Andreea.");
      return;
    }
    setScreen("chat");
    // Verifică dacă există deja conversație validă
    const hasValid = chatMessages.some(m =>
      m.role === "assistant" && m.content && m.content.indexOf("__ERR__") !== 0
    );

  function renderStepFooter(s){
    if(!s) return null;
    if(checkState==="correct"){
      return (
        <div className="slideUp">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"10px 14px",background:"rgba(52,211,153,0.12)",borderRadius:12,border:"1px solid #14532d"}}>
            <div style={{fontSize:26}}>✅</div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:800,color:"#34d399"}}>Excelent!</div>
              <div style={{fontSize:12,color:"#86efac"}}>Continuă mai departe</div>
            </div>
          </div>
          <button onClick={nextStep} style={c.btnBig("#065f46","#34d399")}>
            {stepIdx>=lesson.steps.length-1?"🏁 Finalizează lecția":"Continuă →"}
          </button>
        </div>
      );
    }
    if(checkState==="wrong"){
      return (
        <div className="slideUp">
          <div className="shake" style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"10px 14px",background:"rgba(248,113,113,0.1)",borderRadius:12,border:"1px solid #7f1d1d"}}>

            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:800,color:"#f87171"}}>Nu chiar!</div>
              <div style={{fontSize:12,color:"#fca5a5"}}>Încearcă din nou — știi răspunsul acum</div>
            </div>
          </div>
          <button onClick={retryStep} style={c.btnBig("#7f1d1d","#fca5a5")}>Încearcă din nou</button>
        </div>
      );
    }
    let canCheck = false;
    if(s.type==="intro") canCheck = true;
    else if(s.type==="choice") canCheck = userAnswer !== null;
    else if(s.type==="order") canCheck = shuffledWords.length===0 && orderSelected.length>0;
    else if(s.type==="fill" || s.type==="type") canCheck = userAnswer && userAnswer.trim().length>0;
    else if(s.type==="speak") canCheck = userAnswer && userAnswer.trim().length>0;
    const label = s.type==="intro"?"Am înțeles →":"Verifică";
    return (
      <button onClick={checkStep} disabled={!canCheck}
        style={c.btnBig(canCheck?"#1e3a8a":"#0c1828", canCheck?"#93c5fd":"#374151")}>
        {label}
      </button>
    );
  }

  function renderAndreeaMessage(content){
    // Mesaj de eroare
    if(content.startsWith("__ERR__")){
      const errMsg = content.replace("__ERR__","");
      return (
        <div style={{maxWidth:"92%",background:"rgba(248,113,113,0.08)",border:"1px solid #7f1d1d",borderRadius:14,padding:"14px 16px"}}>

            ⚙️ Deschide Setări
          </button>
        </div>

    }
    const fix = content.match(/FIX \[([^\]]+)\]/);
    const ro = content.match(/RO \[([^\]]+)\]/);
    const en = content.match(/EN \[([^\]]+)\]/);
    const tr = content.match(/TR \[([^\]]+)\]/);
    return (
      <div style={{maxWidth:"92%",display:"flex",flexDirection:"column",gap:6}}>
        {fix && fix[1] && !fix[1].toLowerCase().includes("perfect") && (
          <div style={{background:"rgba(251,191,36,0.08)",border:"1px solid #78350f",color:"#fbbf24",padding:"10px 14px",borderRadius:12,fontSize:16}}>
            <div style={{fontSize:12,fontWeight:800,letterSpacing:1.5,marginBottom:4,opacity:0.8}}>✏️ CORECTARE</div>
            {fix[1]}
          </div>

          <div style={{background:"rgba(52,211,153,0.08)",border:"1px solid #14532d",color:"#34d399",padding:"8px 14px",borderRadius:12,fontSize:15,fontWeight:700}}>✨ Perfect!</div>
        )}

          <div style={{background:"#0c1828",border:"1px solid #1a2840",color:"#cbd5e1",padding:"10px 14px",borderRadius:12,fontSize:16,fontStyle:"italic",lineHeight:1.5}}>
            {ro[1]}
          </div>

        {en && en[1] && (
          <div style={{background:"#0c1828",border:"1px solid #1e40af",borderRadius:"16px 16px 16px 4px",padding:"12px 16px"}}>
            <div style={{color:"#bfdbfe",fontSize:18,fontWeight:600,lineHeight:1.5}}>
              {en[1]}
              <button onClick={()=>speak(en[1],"en",0.92)}
                style={{marginLeft:8,background:"none",border:"none",color:"#60a5fa",fontSize:18,cursor:"pointer"}}>🔊</button>
            </div>

              <div style={{marginTop:8,paddingTop:8,borderTop:"1px dashed #1e40af",color:"#94a3b8",fontSize:14,fontStyle:"italic",lineHeight:1.45}}>
                🇷🇴 {tr[1]}
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  // ============= RENDER PRINCIPAL =============

          </div>

        </div>

              {isDailyTest && <div style={{fontSize:13,color:"#fde68a",marginTop:10,padding:"8px 12px",background:"rgba(251,191,36,0.08)",borderRadius:10}}>🔄 Mâine vei avea alte întrebări</div>}

              <div style={{fontSize:11,color:dailyTestDoneToday?"#86efac":"#fde68a",fontWeight:800,letterSpacing:2,marginBottom:6}}>
                {dailyTestDoneToday?"✅ TESTUL ZILEI — FĂCUT AZI":"🏆 TESTUL ZILEI"}

          <div style={{background:"linear-gradient(135deg,#1e3a8a 0%,#1e40af 50%,#3730a3 100%)",borderRadius:20,padding:20,position:"relative",overflow:"hidden",boxShadow:"0 8px 30px rgba(30,58,138,0.4)"}}>

              <button key={l.id} onClick={()=>!isLocked && startLesson(l)} disabled={isLocked}

                setXp(0); setCompleted({}); setStreak(0); setLastActiveDay("");
              }
            }} style={{background:"#1a0a0a",border:"1px solid #7f1d1d",color:"#f87171",borderRadius:10,padding:"13px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Lexend',sans-serif",width:"100%"}}>🗑 Resetează progresul</button>
          </div>

          <div style={c.card}>
            <div style={{fontSize:17,fontWeight:800,color:"#e2e8f0",marginBottom:10}}>💾 Backup progres</div>
            <div style={{fontSize:14,color:"#94a3b8",lineHeight:1.5,marginBottom:12}}>
              Salvează XP, streak și lecțiile complete într-un fișier. Util dacă schimbi telefonul sau resetezi browserul.
            </div>
            <button onClick={exportProgress}
              style={{background:"#0c1828",border:"1px solid #1e40af",color:"#60a5fa",borderRadius:10,padding:"13px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Lexend',sans-serif",width:"100%",marginBottom:8}}>
              📥 Descarcă backup
            </button>
            <label style={{display:"block",background:"#0c1828",border:"1px solid #14532d",color:"#34d399",borderRadius:10,padding:"13px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Lexend',sans-serif",width:"100%",textAlign:"center"}}>
              📤 Importă backup
              <input type="file" accept="application/json,.json" onChange={importProgress} style={{display:"none"}}/>
            </label>
          </div>

          <div style={{textAlign:"center",fontSize:12,color:"#475569",padding:"10px 0"}}>
            EnglishLab v3.5.2 · Andreea<br/>Construit cu Claude Haiku 4.5
          </div>
          <div style={{height:8}}/>
        </div>
        <div style={c.nav}>
          {navItems.map(n=>(
            <button key={n.id} style={c.navBtn(screen===n.id,n.col)}
              onClick={()=>{if(n.id==="chat")openChat(); else go(n.id);}}>
              <span style={{fontSize:22}}>{n.ico}</span>
              <span style={{fontSize:10,fontWeight:700}}>{n.lbl}</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<EnglishLab/>);
</script>
</body>
</html>
